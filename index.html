<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Budget Tracker</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 6px; max-width: 600px; margin: auto; background: #f4f4f9; color: #333; }
        
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        h2 { margin: 0; font-size: 1.1em; font-weight: 800; }
        .title-highlight { color: #007bff; }
        
        .card { background: white; border: 1px solid #ddd; padding: 6px; margin-bottom: 5px; border-radius: 6px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        input, button { margin: 1px 0; padding: 5px; width: 100%; box-sizing: border-box; border-radius: 4px; border: 1px solid #ccc; font-size: 13px; }
        button { cursor: pointer; font-weight: bold; border: none; }
        
        .flex { display: flex; gap: 4px; align-items: center; }
        .flex > * { flex: 1; }
        
        .danger { background: #ff4d4d; color: white; }
        .success { background: #4caf50; color: white; }
        .primary { background: #007bff; color: white; }
        .secondary { background: #6c757d; color: white; }
        
        .action-btn { padding: 3px; width: auto; font-size: 0.8em; }
        .cat-btn { padding: 1px 4px; width: auto; background: #eee; color: #333; font-size: 0.7em; margin-left: 1px; }
        .header-btn { width: auto; padding: 3px 6px; font-size: 0.85em; }
        
        details { margin-top: 3px; font-size: 0.8em; border-top: 1px solid #f0f0f0; }
        summary { cursor: pointer; color: #007bff; padding: 1px 0; }
        .table-scroll { max-height: 100px; overflow-y: auto; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { border-bottom: 1px solid #eee; padding: 3px 2px; text-align: left; font-size: 0.75em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
        /* Titel verkleinert & Platz optimiert */
        .cat-title { font-size: 0.85em; font-weight: bold; margin: 0; flex-shrink: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 55%; }
        .cat-stats { font-size: 0.8em; display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
        
        #statsModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; }
        .modal-content { background: white; padding: 12px; border-radius: 10px; width: 92%; max-width: 450px; margin: 5% auto; max-height: 85vh; overflow-y: auto; }
        
        .hard-reset { margin-top: 15px; text-align: center; font-size: 0.75em; color: #888; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header-container">
        <h2><span class="title-highlight">Budget</span></h2>
        <div class="flex" style="gap: 3px; flex: none;">
            <button class="primary header-btn" onclick="showStats()">📊</button>
            <button class="danger header-btn" onclick="resetMonth()">⌛</button>
            <button class="secondary header-btn" onclick="exportData()">💾</button>
            <input type="file" id="importFile" style="display:none" onchange="importData(event)">
            <button class="secondary header-btn" onclick="document.getElementById('importFile').click()">📂</button>
        </div>
    </div>

    <div id="app"></div>

    <div class="card" style="border: 1px dashed #ccc; background: #fafafa; padding: 5px;">
        <div class="flex">
            <input type="text" id="newCatName" placeholder="Kategorie" style="flex: 2;">
            <input type="number" id="newCatBudget" placeholder="CHF/Mt." style="flex: 1;">
            <button class="success" onclick="addCategory()" style="width: 35px;">+</button>
        </div>
    </div>

    <div class="hard-reset" onclick="hardReset()">Hard-Reset</div>

    <div id="statsModal"><div class="modal-content" id="statsContent"></div></div>

    <script>
        const defaultData = [
            { id: 101, name: "Miete", budget: 1300.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 102, name: "Versicherung", budget: 15.60, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 103, name: "Serafe", budget: 27.90, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 104, name: "Entsorgung", budget: 40.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 201, name: "Treibstoff", budget: 141.65, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 202, name: "Auto Vers.", budget: 68.35, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 203, name: "Auto Steuer", budget: 80.35, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 204, name: "Auto Unterhalt", budget: 154.15, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 205, name: "Auto Rückst.", budget: 250.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 301, name: "Einkauf", budget: 1000.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 302, name: "Restaurant", budget: 250.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 303, name: "Kleider", budget: 250.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 304, name: "Krankenkasse", budget: 700.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 305, name: "Gesundheit", budget: 300.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 401, name: "Abos", budget: 32.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 402, name: "Internet", budget: 20.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 403, name: "Handy", budget: 22.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 501, name: "Freizeit", budget: 300.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 502, name: "Training", budget: 40.50, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 503, name: "Schule/Lager", budget: 30.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 504, name: "Geschenke", budget: 75.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 505, name: "Ferien", budget: 333.35, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 601, name: "Steuern", budget: 416.65, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 602, name: "Säule 3a", budget: 208.35, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 603, name: "Sparen/Invest", budget: 100.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 604, name: "Reserve", budget: 300.00, yearlySpent: 0, bilanz: 0, expenses: [] }
        ];

        let data = [];
        
        function loadData() {
            try {
                const saved = localStorage.getItem('budgetDataV3');
                if (saved) {
                    data = JSON.parse(saved);
                } else {
                    data = JSON.parse(JSON.stringify(defaultData));
                }
            } catch (e) { 
                data = JSON.parse(JSON.stringify(defaultData)); 
            }
            saveData(false);
        }

        function saveData(shouldRender = true) {
            localStorage.setItem('budgetDataV3', JSON.stringify(data));
            if (shouldRender) render();
        }
        
        function hardReset() {
            if (confirm('Alles löschen?')) {
                localStorage.clear();
                data = JSON.parse(JSON.stringify(defaultData));
                saveData();
            }
        }

        function addCategory() {
            const name = document.getElementById('newCatName').value.trim();
            const budget = parseFloat(document.getElementById('newCatBudget').value);
            if (name && budget) {
                data.push({ id: Date.now(), name, budget, yearlySpent: 0, bilanz: 0, expenses: [] });
                document.getElementById('newCatName').value = '';
                document.getElementById('newCatBudget').value = '';
                saveData();
            }
        }

        function deleteCategory(id) {
            if (confirm('Löschen?')) {
                data = data.filter(c => c.id !== id);
                saveData();
            }
        }

        function moveCategory(id, direction) {
            const index = data.findIndex(c => c.id === id);
            const newIndex = index + direction;
            if (newIndex >= 0 && newIndex < data.length) {
                [data[index], data[newIndex]] = [data[newIndex], data[index]];
                saveData();
            }
        }

        function addExpense(catId) {
            const amtInput = document.getElementById('amt_' + catId);
            const noteInput = document.getElementById('note_' + catId);
            const amount = parseFloat(amtInput.value.replace(',', '.'));
            if (amount) {
                const cat = data.find(c => c.id === catId);
                const d = new Date();
                cat.expenses.push({
                    id: Date.now(),
                    date: `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.`,
                    amount,
                    note: noteInput.value || '-'
                });
                amtInput.value = ''; noteInput.value = '';
                saveData();
            }
        }

        function deleteExpense(catId, expId) {
            if (confirm('Löschen?')) {
                const cat = data.find(c => c.id === catId);
                cat.expenses = cat.expenses.filter(e => e.id !== expId);
                saveData();
            }
        }

        function resetMonth() {
            if (confirm('Monat abschliessen? Ausgaben werden ins Jahrestotal verschoben.')) {
                data.forEach(cat => {
                    const monthlySpent = cat.expenses.reduce((s, e) => s + e.amount, 0);
                    cat.yearlySpent += monthlySpent;
                    cat.bilanz += (cat.budget - monthlySpent);
                    cat.expenses = [];
                });
                saveData();
            }
        }

        function showStats() {
            let totalMt = 0;
            let totalYrSpent = 0;
            let totalYrBudget = 0;
            
            let html = `<h3 style="margin:0 0 10px 0;">📊 Statistik & Jahrestotal</h3>
                        <table style="width:100%; font-size:0.8em;">
                        <tr style="font-weight:bold; border-bottom: 2px solid #333;">
                            <td>Kategorie</td>
                            <td style="text-align:right;">Mt. Bilanz</td>
                            <td style="text-align:right;">Jahr Ausg.</td>
                            <td style="text-align:right;">Jahr Budget</td>
                        </tr>`;
            
            data.forEach(cat => {
                const monthlySpent = cat.expenses.reduce((s, e) => s + e.amount, 0);
                const bal = cat.bilanz + (cat.budget - monthlySpent);
                const yrBudget = cat.budget * 12;
                const yrSpent = cat.yearlySpent + monthlySpent;
                
                totalMt += bal;
                totalYrSpent += yrSpent;
                totalYrBudget += yrBudget;
                
                html += `<tr>
                            <td>${cat.name}</td>
                            <td style="text-align:right; color:${bal < 0 ? 'red' : 'green'}">${bal.toFixed(2)}</td>
                            <td style="text-align:right;">${yrSpent.toFixed(2)}</td>
                            <td style="text-align:right; color:#888;">${yrBudget.toFixed(0)}</td>
                        </tr>`;
            });
            
            html += `<tr style="border-top:2px solid #333; font-weight:bold;">
                        <td>TOTAL</td>
                        <td style="text-align:right; color:${totalMt < 0 ? 'red' : 'green'}">${totalMt.toFixed(2)}</td>
                        <td style="text-align:right;">${totalYrSpent.toFixed(2)}</td>
                        <td style="text-align:right;">${totalYrBudget.toFixed(0)}</td>
                     </tr></table>`;
            
            html += `<br><button class="secondary" onclick="document.getElementById('statsModal').style.display='none'">Schliessen</button>`;
            document.getElementById('statsContent').innerHTML = html;
            document.getElementById('statsModal').style.display = 'block';
        }

        function exportData() {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([JSON.stringify(data)], { type: 'application/json' }));
            a.download = `budget.json`; a.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { data = JSON.parse(ev.target.result); saveData(); };
            reader.readAsText(e.target.files[0]);
        }

        function render() {
            let html = '';
            data.forEach((cat) => {
                const spent = cat.expenses.reduce((s, e) => s + e.amount, 0);
                const rest = cat.budget - spent;
                const totalBilanz = cat.bilanz + rest;

                html += `
                <div class="card">
                    <div class="cat-header">
                        <div class="cat-title">${cat.name}</div>
                        <div class="cat-stats">
                            <span style="font-weight:bold; color:${rest < 0 ? 'red' : 'green'};">${rest.toFixed(2)}</span>
                            <span style="color:#888; font-size:0.85em;">(Mt: ${totalBilanz.toFixed(0)})</span>
                            <div style="margin-left:2px;">
                                <button class="cat-btn" onclick="moveCategory(${cat.id}, -1)">↑</button>
                                <button class="cat-btn" onclick="moveCategory(${cat.id}, 1)">↓</button>
                                <button class="cat-btn" style="color:red" onclick="deleteCategory(${cat.id})">✕</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex">
                        <input type="number" step="any" id="amt_${cat.id}" placeholder="CHF" style="flex:0.7;">
                        <input type="text" id="note_${cat.id}" placeholder="Notiz" style="flex:1.3;">
                        <button class="primary action-btn" style="width:35px;" onclick="addExpense(${cat.id})">OK</button>
                    </div>
                    <details>
                        <summary>Historie (${cat.expenses.length})</summary>
                        <div class="table-scroll">
                            <table>
                                <colgroup><col style="width:35px;"><col style="width:45px;"><col><col style="width:25px;"></colgroup>
                                ${[...cat.expenses].reverse().map(e => `
                                    <tr>
                                        <td>${e.date}</td>
                                        <td><b>${e.amount}</b></td>
                                        <td style="color:#666;">${e.note}</td>
                                        <td style="text-align:right"><button class="danger action-btn" onclick="deleteExpense(${cat.id}, ${e.id})">✕</button></td>
                                    </tr>`).join('')}
                            </table>
                        </div>
                    </details>
                </div>`;
            });
            document.getElementById('app').innerHTML = html;
        }
        
        loadData();
        render();
    </script>
</body>
</html>
