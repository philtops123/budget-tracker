<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Budget Tracker</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 8px; max-width: 600px; margin: auto; background: #f4f4f9; color: #333; }
        
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        h2 { margin: 0; font-size: 1.2em; font-weight: 800; }
        .title-highlight { color: #007bff; }
        
        .card { background: white; border: 1px solid #ddd; padding: 8px; margin-bottom: 6px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        input, button { margin: 2px 0; padding: 6px; width: 100%; box-sizing: border-box; border-radius: 5px; border: 1px solid #ccc; font-size: 14px; }
        button { cursor: pointer; font-weight: bold; border: none; }
        
        .flex { display: flex; gap: 4px; align-items: center; }
        .flex > * { flex: 1; }
        
        .danger { background: #ff4d4d; color: white; }
        .success { background: #4caf50; color: white; }
        .primary { background: #007bff; color: white; }
        .secondary { background: #6c757d; color: white; }
        
        .action-btn { padding: 4px; width: auto; font-size: 0.85em; }
        .cat-btn { padding: 2px 5px; width: auto; background: #eee; color: #333; font-size: 0.75em; margin-left: 1px; }
        .header-btn { width: auto; padding: 4px 8px; font-size: 0.9em; }
        
        details { margin-top: 4px; font-size: 0.85em; border-top: 1px solid #f0f0f0; }
        summary { cursor: pointer; color: #007bff; padding: 2px 0; }
        .table-scroll { max-height: 120px; overflow-y: auto; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { border-bottom: 1px solid #eee; padding: 4px 2px; text-align: left; font-size: 0.8em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
        .cat-title { font-size: 0.95em; font-weight: bold; margin: 0; flex-shrink: 0; }
        .cat-stats { font-size: 0.85em; display: flex; gap: 8px; align-items: center; }
        
        .yearly-stats { font-size: 0.8em; color: #555; background: #f8f9fa; padding: 4px 6px; border-radius: 4px; margin-bottom: 6px; display: flex; justify-content: space-between; border: 1px solid #e9ecef; }

        #statsModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; }
        .modal-content { background: white; padding: 15px; border-radius: 12px; width: 90%; max-width: 400px; margin: 10% auto; }
        
        /* Neuer Button für Hard Reset */
        .hard-reset { margin-top: 20px; text-align: center; font-size: 0.8em; color: #888; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header-container">
        <h2><span class="title-highlight">Budget</span></h2>
        <div class="flex" style="gap: 4px; flex: none;">
            <button class="primary header-btn" onclick="showStats()">📊</button>
            <button class="danger header-btn" onclick="resetMonth()">⌛</button>
            <button class="secondary header-btn" onclick="exportData()">💾</button>
            <input type="file" id="importFile" style="display:none" onchange="importData(event)">
            <button class="secondary header-btn" onclick="document.getElementById('importFile').click()">📂</button>
        </div>
    </div>

    <div id="app"></div>

    <div class="card" style="border: 1px dashed #ccc; background: #fafafa; padding: 6px;">
        <div class="flex">
            <input type="text" id="newCatName" placeholder="Kategorie" style="flex: 2;">
            <input type="number" id="newCatBudget" placeholder="CHF/Mt." style="flex: 1;">
            <button class="success" onclick="addCategory()" style="width: 40px;">+</button>
        </div>
    </div>

    <div class="hard-reset" onclick="hardReset()">Alles löschen & Kategorien neu laden</div>

    <div id="statsModal"><div class="modal-content" id="statsContent"></div></div>

    <script>
        const defaultData = [
            { id: 101, name: "Miete (inkl. Wasser/Strom)", budget: 1300.00, yearlyBudget: 15600.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 102, name: "Hausrat / Privathaftpflicht", budget: 15.60, yearlyBudget: 187.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 103, name: "Serafe (Radio/TV)", budget: 27.90, yearlyBudget: 335.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 104, name: "Abfall und Entsorgung", budget: 40.00, yearlyBudget: 480.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            
            { id: 201, name: "Treibstoff (beide Autos)", budget: 141.65, yearlyBudget: 1700.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 202, name: "Versicherungen (beide)", budget: 68.35, yearlyBudget: 820.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 203, name: "Strassensteuern (beide)", budget: 80.35, yearlyBudget: 964.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 204, name: "Service & Unterhalt (beide)", budget: 154.15, yearlyBudget: 1850.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 205, name: "Auto-Rückstellung", budget: 250.00, yearlyBudget: 3000.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            
            { id: 301, name: "Einkäufe (Nahrung/Haushalt)", budget: 1000.00, yearlyBudget: 12000.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 302, name: "Essen auswärts / Bestellt", budget: 250.00, yearlyBudget: 3000.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 303, name: "Kleider", budget: 250.00, yearlyBudget: 3000.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 304, name: "Krankenkasse", budget: 700.00, yearlyBudget: 8400.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 305, name: "Gesundheitskosten (Arzt)", budget: 300.00, yearlyBudget: 3600.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            
            { id: 401, name: "Laufende Abos", budget: 32.00, yearlyBudget: 384.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 402, name: "Internet", budget: 20.00, yearlyBudget: 240.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 403, name: "Handy (Natel 2x)", budget: 22.00, yearlyBudget: 264.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            
            { id: 501, name: "Freizeit-Aktivitäten", budget: 300.00, yearlyBudget: 3600.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 502, name: "Training (Lina & Lara)", budget: 40.50, yearlyBudget: 486.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 503, name: "Schule / Lager / Geschenk", budget: 30.00, yearlyBudget: 360.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 504, name: "Geschenke (allgemein)", budget: 75.00, yearlyBudget: 900.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 505, name: "Ferien", budget: 333.35, yearlyBudget: 4000.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            
            { id: 601, name: "Steuern", budget: 416.65, yearlyBudget: 5000.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 602, name: "Säule 3a", budget: 208.35, yearlyBudget: 2500.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 603, name: "Sparen Kinder & Invest", budget: 100.00, yearlyBudget: 1200.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 604, name: "Reservebetrag", budget: 300.00, yearlyBudget: 3600.00, yearlySpent: 0, bilanz: 0, expenses: [] }
        ];

        let data = [];
        
        function loadData() {
            try {
                // Suche nach Daten
                const saved = localStorage.getItem('budgetDataV3');
                
                if (saved) {
                    const parsed = JSON.parse(saved);
                    // Sicherstellen, dass nicht versehentlich ein leeres Array geladen wird
                    if (parsed && parsed.length > 0) {
                        data = parsed;
                    } else {
                        // Wenn Array leer ist, nimm die Standarddaten
                        data = JSON.parse(JSON.stringify(defaultData)); 
                    }
                } else {
                    // Keine Daten da -> Standarddaten
                    data = JSON.parse(JSON.stringify(defaultData));
                }
            } catch (e) { 
                data = JSON.parse(JSON.stringify(defaultData)); 
            }
            saveData(false); // Speichern ohne erneutes Rendern, das passiert nachher
        }

        function saveData(shouldRender = true) {
            localStorage.setItem('budgetDataV3', JSON.stringify(data));
            if (shouldRender) render();
        }
        
        function hardReset() {
            if (confirm('Achtung: Dies löscht alle aktuellen Eingaben und lädt die Standard-Kategorien neu. Wirklich fortfahren?')) {
                localStorage.removeItem('budgetDataV3');
                localStorage.removeItem('budgetDataV2');
                localStorage.removeItem('budgetData');
                data = JSON.parse(JSON.stringify(defaultData));
                saveData();
            }
        }

        function addCategory() {
            const name = document.getElementById('newCatName').value.trim();
            const budget = parseFloat(document.getElementById('newCatBudget').value);
            if (name && budget) {
                data.push({ 
                    id: Date.now(), 
                    name, 
                    budget, 
                    yearlyBudget: budget * 12, 
                    yearlySpent: 0, 
                    bilanz: 0, 
                    expenses: [] 
                });
                document.getElementById('newCatName').value = '';
                document.getElementById('newCatBudget').value = '';
                saveData();
            }
        }

        function deleteCategory(id) {
            if (confirm('Kategorie löschen?')) {
                data = data.filter(c => c.id !== id);
                saveData();
            }
        }

        function moveCategory(id, direction) {
            const index = data.findIndex(c => c.id === id);
            const newIndex = index + direction;
            if (newIndex >= 0 && newIndex < data.length) {
                [data[index], data[newIndex]] = [data[newIndex], data[index]];
                saveData();
            }
        }

        function addExpense(catId) {
            const amtInput = document.getElementById('amt_' + catId);
            const noteInput = document.getElementById('note_' + catId);
            const amount = parseFloat(amtInput.value.replace(',', '.'));
            if (amount) {
                const cat = data.find(c => c.id === catId);
                const d = new Date();
                cat.expenses.push({
                    id: Date.now(),
                    date: `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.`,
                    amount,
                    note: noteInput.value || '-'
                });
                amtInput.value = ''; noteInput.value = '';
                saveData();
            }
        }

        function deleteExpense(catId, expId) {
            if (confirm('Ausgabe löschen?')) {
                const cat = data.find(c => c.id === catId);
                cat.expenses = cat.expenses.filter(e => e.id !== expId);
                saveData();
            }
        }

        function resetMonth() {
            if (confirm('Monat abschliessen? Die Ausgaben werden zum Jahrestotal addiert und der Monat geleert.')) {
                data.forEach(cat => {
                    const monthlySpent = cat.expenses.reduce((s, e) => s + e.amount, 0);
                    cat.yearlySpent += monthlySpent;
                    cat.bilanz += (cat.budget - monthlySpent);
                    cat.expenses = [];
                });
                saveData();
            }
        }

        function showStats() {
            let total = 0;
            let html = `<h3 style="margin:0 0 10px 0;">📊 Bilanz</h3><table style="width:100%; font-size:0.9em;">`;
            data.forEach(cat => {
                const bal = cat.bilanz + (cat.budget - cat.expenses.reduce((s, e) => s + e.amount, 0));
                total += bal;
                html += `<tr><td>${cat.name}</td><td style="text-align:right; color:${bal < 0 ? 'red' : 'green'}">${bal.toFixed(2)}</td></tr>`;
            });
            html += `<tr style="border-top:1px solid #333; font-weight:bold;"><td>Gesamt</td><td style="text-align:right;">${total.toFixed(2)} CHF</td></tr></table>`;
            html += `<br><button class="secondary" onclick="document.getElementById('statsModal').style.display='none'">Schliessen</button>`;
            document.getElementById('statsContent').innerHTML = html;
            document.getElementById('statsModal').style.display = 'block';
        }

        function exportData() {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([JSON.stringify(data)], { type: 'application/json' }));
            a.download = `budget.json`; a.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { data = JSON.parse(ev.target.result); saveData(); };
            reader.readAsText(e.target.files[0]);
        }

        function render() {
            let html = '';
            data.forEach((cat) => {
                const spent = cat.expenses.reduce((s, e) => s + e.amount, 0);
                const rest = cat.budget - spent;
                const total = cat.bilanz + rest;
                
                const actualYearlyBudget = cat.yearlyBudget || (cat.budget * 12);
                const actualYearlySpent = cat.yearlySpent || 0;
                const yearlyRest = actualYearlyBudget - actualYearlySpent - spent;

                html += `
                <div class="card">
                    <div class="cat-header">
                        <div class="cat-title">${cat.name}</div>
                        <div class="cat-stats">
                            <span style="font-weight:bold; color:${rest < 0 ? 'red' : 'green'};">${rest.toFixed(2)}</span>
                            <span style="color:#888; font-size:0.8em;">(Mt: Σ ${total.toFixed(0)})</span>
                            <div>
                                <button class="cat-btn" onclick="moveCategory(${cat.id}, -1)">↑</button>
                                <button class="cat-btn" onclick="moveCategory(${cat.id}, 1)">↓</button>
                                <button class="cat-btn" style="color:red" onclick="deleteCategory(${cat.id})">✕</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="yearly-stats">
                        <span>Jahr: ${actualYearlyBudget.toFixed(2)}</span>
                        <span>Rest: <b style="color:${yearlyRest < 0 ? '#d32f2f' : '#2e7d32'}">${yearlyRest.toFixed(2)}</b></span>
                    </div>

                    <div class="flex" style="margin-top:4px;">
                        <input type="number" step="any" id="amt_${cat.id}" placeholder="CHF" style="flex:0.8;">
                        <input type="text" id="note_${cat.id}" placeholder="Notiz" style="flex:1.2;">
                        <button class="primary action-btn" style="width:35px;" onclick="addExpense(${cat.id})">OK</button>
                    </div>
                    <details>
                        <summary>Historie (${cat.expenses.length})</summary>
                        <div class="table-scroll">
                            <table>
                                <colgroup><col style="width:40px;"><col style="width:50px;"><col><col style="width:30px;"></colgroup>
                                ${[...cat.expenses].reverse().map(e => `
                                    <tr>
                                        <td>${e.date}</td>
                                        <td><b>${e.amount}</b></td>
                                        <td style="color:#666;">${e.note}</td>
                                        <td style="text-align:right"><button class="danger action-btn" onclick="deleteExpense(${cat.id}, ${e.id})">✕</button></td>
                                    </tr>`).join('')}
                            </table>
                        </div>
                    </details>
                </div>`;
            });
            document.getElementById('app').innerHTML = html;
        }
        
        // Initialisierung starten
        loadData();
        render();
    </script>
</body>
</html>
