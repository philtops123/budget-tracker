<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Budget Tracker</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 8px; max-width: 600px; margin: auto; background: #f4f4f9; color: #333; }
        
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        h2 { margin: 0; font-size: 1.2em; font-weight: 800; }
        .title-highlight { color: #007bff; }
        
        .card { background: white; border: 1px solid #ddd; padding: 8px; margin-bottom: 6px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        input, button, select { margin: 2px 0; padding: 6px; width: 100%; box-sizing: border-box; border-radius: 5px; border: 1px solid #ccc; font-size: 14px; }
        button { cursor: pointer; font-weight: bold; border: none; }
        
        .flex { display: flex; gap: 4px; align-items: center; }
        .flex > * { flex: 1; }
        
        .danger { background: #ff4d4d; color: white; }
        .success { background: #4caf50; color: white; }
        .primary { background: #007bff; color: white; }
        .secondary { background: #6c757d; color: white; }
        
        .action-btn { padding: 4px; width: auto; font-size: 0.85em; }
        .cat-btn { padding: 4px 6px; width: auto; background: #eee; color: #333; font-size: 0.85em; margin-left: 2px; border-radius: 4px; }
        .header-btn { width: auto; padding: 4px 8px; font-size: 0.9em; }
        
        details { margin-top: 4px; font-size: 0.85em; border-top: 1px solid #f0f0f0; }
        summary { cursor: pointer; color: #007bff; padding: 2px 0; }
        .table-scroll { max-height: 120px; overflow-y: auto; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { border-bottom: 1px solid #eee; padding: 4px 2px; text-align: left; font-size: 0.8em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; gap: 6px; }
        .cat-title { font-size: 0.8em; font-weight: bold; margin: 0; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cat-stats { font-size: 0.8em; display: flex; gap: 6px; align-items: center; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
        
        .cat-settings { display: none; gap: 4px; margin-top: 6px; padding: 6px; background: #f8f9fa; border: 1px solid #eee; border-radius: 4px; align-items: center; flex-wrap: wrap; }
        
        #statsModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; }
        .modal-content { background: white; padding: 15px; border-radius: 12px; width: 90%; max-width: 400px; margin: 10% auto; }
        
        .hard-reset { margin-top: 20px; text-align: center; font-size: 0.8em; color: #888; cursor: pointer; text-decoration: underline; }
        .group-title { margin: 15px 0 5px 4px; font-weight: bold; color: #555; text-transform: uppercase; font-size: 0.85em; letter-spacing: 0.5px; border-bottom: 2px solid #ddd; padding-bottom: 2px; }
    </style>
</head>
<body>

    <div class="header-container">
        <h2><span class="title-highlight">Budget</span></h2>
        <div class="flex" style="gap: 4px; flex: none;">
            <button class="primary header-btn" onclick="showHistory()" title="Historie">🗓️</button>
            <button class="primary header-btn" onclick="showStats()" title="Statistik">📊</button>
            <button class="danger header-btn" onclick="resetMonth()" title="Monat abschließen">⌛</button>
            <button class="secondary header-btn" onclick="exportData()" title="Export">💾</button>
            <input type="file" id="importFile" style="display:none" onchange="importData(event)">
            <button class="secondary header-btn" onclick="document.getElementById('importFile').click()" title="Import">📂</button>
        </div>
    </div>

    <div id="app"></div>

    <div class="card" style="border: 1px dashed #ccc; background: #fafafa; padding: 6px; margin-top: 15px;">
        <div class="flex">
            <select id="newCatGroup" style="flex: 1; padding: 5px; font-size: 12px;">
                <option value="Lebensunterhalt">Lebensunterhalt</option>
                <option value="Wohnen & Haushalt">Haushalt</option>
                <option value="Mobilität">Mobilität</option>
                <option value="Abos & Kommunikation">Abos</option>
                <option value="Freizeit">Freizeit</option>
                <option value="Steuern & Sparen">Sparen</option>
                <option value="Daueraufträge / Ebill">Daueraufträge</option>
                <option value="Sonstiges">Sonstiges</option>
            </select>
            <input type="text" id="newCatName" placeholder="Kategorie" style="flex: 1.5;">
            <input type="number" id="newCatBudget" placeholder="CHF/Mt." style="flex: 1;">
            <button class="success" onclick="addCategory()" style="width: 40px;">+</button>
        </div>
    </div>

    <div class="hard-reset" onclick="hardReset()">Alles löschen & Kategorien neu laden</div>

    <div id="statsModal"><div class="modal-content" id="statsContent"></div></div>

    <script>
        const defaultData = [
            // Wohnen & Haushalt
            { id: 102, group: "Wohnen & Haushalt", name: "Hausrat / Privathaftpflicht", budget: 15.60, yearlyBudget: 187.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 103, group: "Wohnen & Haushalt", name: "Serafe (Radio/TV)", budget: 27.90, yearlyBudget: 335.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 104, group: "Wohnen & Haushalt", name: "Abfall und Entsorgung", budget: 40.00, yearlyBudget: 480.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            
            // Mobilität
            { id: 201, group: "Mobilität", name: "Treibstoff (beide Autos)", budget: 141.65, yearlyBudget: 1700.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 202, group: "Mobilität", name: "Versicherungen (beide)", budget: 68.35, yearlyBudget: 820.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 203, group: "Mobilität", name: "Strassensteuern (beide)", budget: 80.35, yearlyBudget: 964.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 204, group: "Mobilität", name: "Service & Unterhalt (beide)", budget: 154.15, yearlyBudget: 1850.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            
            // Lebensunterhalt
            { id: 301, group: "Lebensunterhalt", name: "Einkäufe (Nahrung/Haushalt)", budget: 1000.00, yearlyBudget: 12000.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 302, group: "Lebensunterhalt", name: "Essen auswärts / Bestellt", budget: 250.00, yearlyBudget: 3000.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 303, group: "Lebensunterhalt", name: "Kleider", budget: 250.00, yearlyBudget: 3000.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 304, group: "Lebensunterhalt", name: "Krankenkasse", budget: 700.00, yearlyBudget: 8400.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 305, group: "Lebensunterhalt", name: "Gesundheitskosten (Arzt)", budget: 300.00, yearlyBudget: 3600.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            
            // Freizeit
            { id: 501, group: "Freizeit", name: "Freizeit-Aktivitäten", budget: 300.00, yearlyBudget: 3600.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 502, group: "Freizeit", name: "Training (Lina & Lara)", budget: 40.50, yearlyBudget: 486.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 503, group: "Freizeit", name: "Schule / Lager / Geschenk", budget: 30.00, yearlyBudget: 360.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 504, group: "Freizeit", name: "Geschenke (allgemein)", budget: 75.00, yearlyBudget: 900.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 505, group: "Freizeit", name: "Ferien", budget: 333.35, yearlyBudget: 4000.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            
            // Steuern & Sparen
            { id: 601, group: "Steuern & Sparen", name: "Steuern", budget: 416.65, yearlyBudget: 5000.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 602, group: "Steuern & Sparen", name: "Säule 3a", budget: 208.35, yearlyBudget: 2500.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 604, group: "Steuern & Sparen", name: "Reservebetrag", budget: 300.00, yearlyBudget: 3600.00, yearlySpent: 0, bilanz: 0, expenses: [] },

            // Daueraufträge / Ebill
            { id: 101, group: "Daueraufträge / Ebill", name: "Miete (inkl. Wasser/Strom)", budget: 1300.00, yearlyBudget: 15600.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 205, group: "Daueraufträge / Ebill", name: "Auto-Rückstellung", budget: 250.00, yearlyBudget: 3000.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 401, group: "Daueraufträge / Ebill", name: "Laufende Abos", budget: 32.00, yearlyBudget: 384.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 402, group: "Daueraufträge / Ebill", name: "Internet", budget: 20.00, yearlyBudget: 240.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 403, group: "Daueraufträge / Ebill", name: "Handy (Natel 2x)", budget: 22.00, yearlyBudget: 264.00, yearlySpent: 0, bilanz: 0, expenses: [] },
            { id: 603, group: "Daueraufträge / Ebill", name: "Sparen Kinder & Invest", budget: 100.00, yearlyBudget: 1200.00, yearlySpent: 0, bilanz: 0, expenses: [] }
        ];

        const groupOrder = ['Lebensunterhalt', 'Wohnen & Haushalt', 'Mobilität', 'Abos & Kommunikation', 'Freizeit', 'Steuern & Sparen', 'Daueraufträge / Ebill', 'Sonstiges'];
        let data = [];
        let historyData = [];
        
        function loadData() {
            try {
                const savedV4 = localStorage.getItem('budgetDataV4');
                if (savedV4) {
                    data = JSON.parse(savedV4);
                } else {
                    data = JSON.parse(JSON.stringify(defaultData)); 
                }
                
                const savedHistory = localStorage.getItem('budgetHistory');
                if (savedHistory) {
                    historyData = JSON.parse(savedHistory);
                }
            } catch (e) { 
                data = JSON.parse(JSON.stringify(defaultData)); 
                historyData = [];
            }
            saveData();
        }

        function saveData(shouldRender = true) {
            localStorage.setItem('budgetDataV4', JSON.stringify(data));
            localStorage.setItem('budgetHistory', JSON.stringify(historyData));
            if (shouldRender) render();
        }
        
        function hardReset() {
            if (confirm('Achtung: Dies löscht alle aktuellen Eingaben und lädt die Standard-Kategorien neu. Wirklich fortfahren?')) {
                if (confirm('Bist du dir wirklich GANZ sicher? Alle bisherigen Daten gehen unwiderruflich verloren!')) {
                    localStorage.removeItem('budgetDataV4');
                    localStorage.removeItem('budgetHistory');
                    data = JSON.parse(JSON.stringify(defaultData));
                    historyData = [];
                    saveData();
                }
            }
        }

        function addCategory() {
            const group = document.getElementById('newCatGroup').value;
            const name = document.getElementById('newCatName').value.trim();
            const budget = parseFloat(document.getElementById('newCatBudget').value);
            if (name && budget) {
                const newCat = { 
                    id: Date.now(), 
                    group,
                    name, 
                    budget, 
                    yearlyBudget: budget * 12, 
                    yearlySpent: 0, 
                    bilanz: 0, 
                    expenses: [] 
                };

                if (group === "Daueraufträge / Ebill") {
                    const d = new Date();
                    newCat.expenses.push({
                        id: Date.now() + 1,
                        date: `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.`,
                        amount: budget,
                        note: 'Auto-Abzug',
                        isAuto: true
                    });
                }

                data.push(newCat);
                document.getElementById('newCatName').value = '';
                document.getElementById('newCatBudget').value = '';
                saveData();
            }
        }

        function toggleSettings(id) {
            const el = document.getElementById('settings_' + id);
            el.style.display = (el.style.display === 'none' || el.style.display === '') ? 'flex' : 'none';
        }

        function deleteCategory(id) {
            if (confirm('Kategorie löschen?')) {
                data = data.filter(c => c.id !== id);
                saveData();
            }
        }

        function moveCategory(id, direction) {
            const cat = data.find(c => c.id === id);
            const groupName = cat.group || 'Sonstiges';
            
            const groupItems = data.filter(c => (c.group || 'Sonstiges') === groupName);
            const currentIndex = groupItems.findIndex(c => c.id === id);
            const newIndex = currentIndex + direction;

            if (newIndex >= 0 && newIndex < groupItems.length) {
                const idToSwapWith = groupItems[newIndex].id;
                const mainIndex1 = data.findIndex(c => c.id === id);
                const mainIndex2 = data.findIndex(c => c.id === idToSwapWith);
                
                [data[mainIndex1], data[mainIndex2]] = [data[mainIndex2], data[mainIndex1]];
                saveData();
            }
        }

        function changeGroup(id, newGroup) {
            const cat = data.find(c => c.id === id);
            const oldGroup = cat.group;
            cat.group = newGroup;

            if (newGroup === 'Daueraufträge / Ebill' && oldGroup !== 'Daueraufträge / Ebill') {
                if (!cat.expenses.some(e => e.isAuto)) {
                    const d = new Date();
                    cat.expenses.push({
                        id: Date.now(),
                        date: `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.`,
                        amount: cat.budget,
                        note: 'Auto-Abzug',
                        isAuto: true
                    });
                }
            } else if (newGroup !== 'Daueraufträge / Ebill' && oldGroup === 'Daueraufträge / Ebill') {
                cat.expenses = cat.expenses.filter(e => !e.isAuto);
            }
            saveData();
        }

        function addExpense(catId) {
            const amtInput = document.getElementById('amt_' + catId);
            const noteInput = document.getElementById('note_' + catId);
            const amount = parseFloat(amtInput.value.replace(',', '.'));
            if (amount) {
                const cat = data.find(c => c.id === catId);
                const d = new Date();
                cat.expenses.push({
                    id: Date.now(),
                    date: `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.`,
                    amount,
                    note: noteInput.value || '-'
                });
                amtInput.value = ''; noteInput.value = '';
                saveData();
            }
        }

        function deleteExpense(catId, expId) {
            if (confirm('Ausgabe löschen?')) {
                const cat = data.find(c => c.id === catId);
                cat.expenses = cat.expenses.filter(e => e.id !== expId);
                saveData();
            }
        }

        function getMonthNameFromData() {
            let sampleDate = null;
            for (let cat of data) {
                for (let exp of cat.expenses) {
                    if (exp.date) { sampleDate = exp.date; break; }
                }
                if (sampleDate) break;
            }

            const months = ["Januar", "Februar", "März", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Dezember"];
            let year = new Date().getFullYear();
            
            if (sampleDate) {
                const parts = sampleDate.split('.');
                if (parts.length >= 2) {
                    const mIndex = parseInt(parts[1], 10) - 1;
                    if (mIndex >= 0 && mIndex < 12) return months[mIndex] + " " + year;
                }
            }
            return months[new Date().getMonth()] + " " + year;
        }

        function resetMonth() {
            if (confirm('Monat abschliessen? Die Ausgaben werden zum Jahrestotal addiert und der Monat für die Historie gespeichert.')) {
                const d = new Date();
                
                // Historie-Snapshot erstellen
                const snapshot = {
                    id: Date.now(),
                    monthName: getMonthNameFromData(),
                    totalSpent: 0,
                    categories: JSON.parse(JSON.stringify(data))
                };
                
                data.forEach(cat => {
                    const monthlySpent = cat.expenses.reduce((s, e) => s + e.amount, 0);
                    snapshot.totalSpent += monthlySpent;
                    
                    cat.yearlySpent += monthlySpent;
                    cat.bilanz += (cat.budget - monthlySpent);
                    cat.expenses = [];

                    if (cat.group === 'Daueraufträge / Ebill') {
                        cat.expenses.push({
                            id: Date.now() + Math.floor(Math.random()*10000),
                            date: `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.`,
                            amount: cat.budget,
                            note: 'Auto-Abzug',
                            isAuto: true
                        });
                    }
                });

                historyData.push(snapshot);
                saveData();
            }
        }

        function showHistory() {
            if (historyData.length === 0) {
                alert("Noch keine abgeschlossenen Monate vorhanden.");
                return;
            }
            
            let html = `<h3 style="margin:0 0 10px 0;">🗓️ Historie</h3><div style="max-height: 60vh; overflow-y: auto;">`;
            
            [...historyData].reverse().forEach(h => {
                html += `<details style="margin-bottom:8px; background:#f9f9f9; padding:8px; border-radius:6px; border:1px solid #ddd;">
                            <summary style="font-weight:bold; color:#333;">${h.monthName} <span style="float:right; color:#007bff;">${h.totalSpent.toFixed(2)} CHF</span></summary>
                            <table style="width:100%; font-size:0.85em; margin-top:8px;">`;
                h.categories.forEach(c => {
                    const spent = c.expenses.reduce((s,e) => s + e.amount, 0);
                    if (spent > 0) {
                        html += `<tr>
                                    <td style="padding:4px 0; border-bottom:1px solid #eee;">${c.name}</td>
                                    <td style="text-align:right; padding:4px 0; border-bottom:1px solid #eee;">${spent.toFixed(2)}</td>
                                 </tr>`;
                    }
                });
                html += `</table></details>`;
            });

            html += `</div><br><button class="secondary" onclick="document.getElementById('statsModal').style.display='none'">Schliessen</button>`;
            
            document.getElementById('statsContent').innerHTML = html;
            document.getElementById('statsModal').style.display = 'block';
        }

        function showStats() {
            let totalBilanz = 0;
            let totalYearlyRest = 0;
            
            let html = `<h3 style="margin:0 0 10px 0;">📊 Statistik</h3><div style="max-height: 60vh; overflow-y: auto;">`;

            const renderGroup = (groupName, cats) => {
                if (cats.length === 0) return '';
                let groupHtml = `<div class="group-title">${groupName}</div>`;
                groupHtml += `<table style="width:100%; font-size:0.85em; border-collapse: collapse; margin-bottom: 10px;">`;
                groupHtml += `<tr><th style="text-align:left;">Kategorie</th><th style="text-align:right;">Mt. Bilanz</th><th style="text-align:right;">Jahr Rest</th></tr>`;
                
                cats.forEach(cat => {
                    const spent = cat.expenses.reduce((s, e) => s + e.amount, 0);
                    const bal = cat.bilanz + (cat.budget - spent);
                    totalBilanz += bal;

                    const actualYearlyBudget = cat.yearlyBudget || (cat.budget * 12);
                    const actualYearlySpent = cat.yearlySpent || 0;
                    const yearlyRest = actualYearlyBudget - actualYearlySpent - spent;
                    totalYearlyRest += yearlyRest;

                    groupHtml += `<tr>
                                <td style="padding:6px 0; border-bottom:1px solid #eee; white-space:normal; word-break:break-word;">${cat.name}</td>
                                <td style="padding:6px 0; text-align:right; border-bottom:1px solid #eee; color:${bal < 0 ? 'red' : 'green'}">${bal.toFixed(0)}</td>
                                <td style="padding:6px 0; text-align:right; border-bottom:1px solid #eee; color:${yearlyRest < 0 ? 'red' : 'green'}">${yearlyRest.toFixed(0)}</td>
                             </tr>`;
                });
                groupHtml += `</table>`;
                return groupHtml;
            };

            groupOrder.forEach(groupName => {
                const catsInGroup = data.filter(c => (c.group || 'Sonstiges') === groupName);
                html += renderGroup(groupName, catsInGroup);
            });

            const otherCats = data.filter(c => !groupOrder.includes(c.group || 'Sonstiges'));
            html += renderGroup('Weitere', otherCats);
            
            html += `<table style="width:100%; font-size:0.85em; border-collapse: collapse;">
                     <tr style="border-top:2px solid #333; font-weight:bold;">
                        <td style="padding:6px 0;">Gesamt</td>
                        <td style="text-align:right; padding:6px 0;">${totalBilanz.toFixed(0)}</td>
                        <td style="text-align:right; padding:6px 0;">${totalYearlyRest.toFixed(0)}</td>
                     </tr></table></div>`;
            html += `<br><button class="secondary" onclick="document.getElementById('statsModal').style.display='none'">Schliessen</button>`;
            
            document.getElementById('statsContent').innerHTML = html;
            document.getElementById('statsModal').style.display = 'block';
        }

        function exportData() {
            const exportObj = { data, historyData };
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([JSON.stringify(exportObj)], { type: 'application/json' }));
            a.download = `budget.json`; a.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { 
                try {
                    const imported = JSON.parse(ev.target.result);
                    if (imported.data && imported.historyData) {
                        data = imported.data;
                        historyData = imported.historyData;
                    } else {
                        // Fallback für alte Exporte ohne Historie
                        data = imported; 
                    }
                    saveData(); 
                } catch(err) {
                    alert("Fehler beim Importieren der Datei.");
                }
            };
            reader.readAsText(e.target.files[0]);
        }

        function renderCategoryHTML(cat) {
            const spent = cat.expenses.reduce((s, e) => s + e.amount, 0);
            const rest = cat.budget - spent;
            const total = cat.bilanz + rest;
            
            return `
            <div class="card">
                <div class="cat-header">
                    <div class="cat-title">${cat.name}</div>
                    <div class="cat-stats">
                        <span style="font-weight:bold; color:${rest < 0 ? 'red' : 'green'};">${rest.toFixed(2)}</span>
                        <span style="color:#888; font-size:0.8em;">(Total: ${total.toFixed(0)})</span>
                        <button class="cat-btn" onclick="toggleSettings(${cat.id})" title="Einstellungen">⚙️</button>
                    </div>
                </div>
                
                <div id="settings_${cat.id}" class="cat-settings">
                    <select onchange="changeGroup(${cat.id}, this.value)" style="padding:2px; font-size:0.75em; width:120px; flex: 1;">
                        ${groupOrder.map(g => `<option value="${g}" ${cat.group === g ? 'selected' : ''}>${g}</option>`).join('')}
                        ${!groupOrder.includes(cat.group) ? `<option value="Sonstiges" selected>Sonstiges</option>` : ''}
                    </select>
                    <button class="cat-btn" onclick="moveCategory(${cat.id}, -1)">↑</button>
                    <button class="cat-btn" onclick="moveCategory(${cat.id}, 1)">↓</button>
                    <button class="cat-btn" style="color:red" onclick="deleteCategory(${cat.id})">✕ Löschen</button>
                </div>
                
                <div class="flex" style="margin-top:4px;">
                    <input type="number" step="any" id="amt_${cat.id}" placeholder="CHF" style="flex:0.8;">
                    <input type="text" id="note_${cat.id}" placeholder="Notiz" style="flex:1.2;">
                    <button class="primary action-btn" style="width:35px;" onclick="addExpense(${cat.id})">OK</button>
                </div>
                <details>
                    <summary>Historie (${cat.expenses.length})</summary>
                    <div class="table-scroll">
                        <table>
                            <colgroup><col style="width:40px;"><col style="width:50px;"><col><col style="width:30px;"></colgroup>
                            ${[...cat.expenses].reverse().map(e => `
                                <tr>
                                    <td>${e.date}</td>
                                    <td><b>${e.amount}</b></td>
                                    <td style="color:#666;">${e.note}</td>
                                    <td style="text-align:right"><button class="danger action-btn" onclick="deleteExpense(${cat.id}, ${e.id})">✕</button></td>
                                </tr>`).join('')}
                        </table>
                    </div>
                </details>
            </div>`;
        }

        function render() {
            let html = '';
            
            groupOrder.forEach(groupName => {
                const catsInGroup = data.filter(c => (c.group || 'Sonstiges') === groupName);
                if (catsInGroup.length > 0) {
                    html += `<div class="group-title">${groupName}</div>`;
                    catsInGroup.forEach(cat => html += renderCategoryHTML(cat));
                }
            });

            const otherCats = data.filter(c => !groupOrder.includes(c.group || 'Sonstiges'));
            if (otherCats.length > 0) {
                html += `<div class="group-title">Weitere</div>`;
                otherCats.forEach(cat => html += renderCategoryHTML(cat));
            }

            document.getElementById('app').innerHTML = html;
        }
        
        loadData();
    </script>
</body>
</html>
