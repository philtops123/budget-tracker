<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Budget Tracker</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 8px; max-width: 600px; margin: auto; background: #f4f4f9; color: #333; }
        
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        h2 { margin: 0; font-size: 1.2em; font-weight: 800; }
        .title-highlight { color: #007bff; }
        
        .card { background: white; border: 1px solid #ddd; padding: 8px; margin-bottom: 6px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        input, button { margin: 2px 0; padding: 6px; width: 100%; box-sizing: border-box; border-radius: 5px; border: 1px solid #ccc; font-size: 14px; }
        button { cursor: pointer; font-weight: bold; border: none; }
        
        .flex { display: flex; gap: 4px; align-items: center; }
        .flex > * { flex: 1; }
        
        .danger { background: #ff4d4d; color: white; }
        .success { background: #4caf50; color: white; }
        .primary { background: #007bff; color: white; }
        .secondary { background: #6c757d; color: white; }
        
        .action-btn { padding: 4px; width: auto; font-size: 0.85em; }
        .cat-btn { padding: 2px 5px; width: auto; background: #eee; color: #333; font-size: 0.75em; margin-left: 1px; }
        .header-btn { width: auto; padding: 4px 8px; font-size: 0.9em; }
        
        details { margin-top: 4px; font-size: 0.85em; border-top: 1px solid #f0f0f0; }
        summary { cursor: pointer; color: #007bff; padding: 2px 0; }
        .table-scroll { max-height: 120px; overflow-y: auto; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { border-bottom: 1px solid #eee; padding: 4px 2px; text-align: left; font-size: 0.8em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Kompakter Modus für Mobile */
        .cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
        .cat-title { font-size: 0.95em; font-weight: bold; margin: 0; flex-shrink: 0; }
        .cat-stats { font-size: 0.85em; display: flex; gap: 8px; align-items: center; }

        #statsModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; }
        .modal-content { background: white; padding: 15px; border-radius: 12px; width: 90%; max-width: 400px; margin: 10% auto; }
    </style>
</head>
<body>

    <div class="header-container">
        <h2><span class="title-highlight">Budget</span></h2>
        <div class="flex" style="gap: 4px; flex: none;">
            <button class="primary header-btn" onclick="showStats()">📊</button>
            <button class="danger header-btn" onclick="resetMonth()">⌛</button>
            <button class="secondary header-btn" onclick="exportData()">💾</button>
            <input type="file" id="importFile" style="display:none" onchange="importData(event)">
            <button class="secondary header-btn" onclick="document.getElementById('importFile').click()">📂</button>
        </div>
    </div>

    <div id="app"></div>

    <div class="card" style="border: 1px dashed #ccc; background: #fafafa; padding: 6px;">
        <div class="flex">
            <input type="text" id="newCatName" placeholder="Kategorie" style="flex: 2;">
            <input type="number" id="newCatBudget" placeholder="CHF" style="flex: 1;">
            <button class="success" onclick="addCategory()" style="width: 40px;">+</button>
        </div>
    </div>

    <div id="statsModal"><div class="modal-content" id="statsContent"></div></div>

    <script>
        let data = [];
        try {
            const saved = localStorage.getItem('budgetData');
            if (saved) data = JSON.parse(saved);
        } catch (e) { console.warn('Storage Error'); }

        function saveData() {
            localStorage.setItem('budgetData', JSON.stringify(data));
            render();
        }

        function addCategory() {
            const name = document.getElementById('newCatName').value.trim();
            const budget = parseFloat(document.getElementById('newCatBudget').value);
            if (name && budget) {
                data.push({ id: Date.now(), name, budget, bilanz: 0, expenses: [] });
                document.getElementById('newCatName').value = '';
                document.getElementById('newCatBudget').value = '';
                saveData();
            }
        }

        function deleteCategory(id) {
            if (confirm('Löschen?')) {
                data = data.filter(c => c.id !== id);
                saveData();
            }
        }

        function moveCategory(id, direction) {
            const index = data.findIndex(c => c.id === id);
            const newIndex = index + direction;
            if (newIndex >= 0 && newIndex < data.length) {
                [data[index], data[newIndex]] = [data[newIndex], data[index]];
                saveData();
            }
        }

        function addExpense(catId) {
            const amtInput = document.getElementById('amt_' + catId);
            const noteInput = document.getElementById('note_' + catId);
            const amount = parseFloat(amtInput.value.replace(',', '.'));
            if (amount) {
                const cat = data.find(c => c.id === catId);
                const d = new Date();
                cat.expenses.push({
                    id: Date.now(),
                    date: `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.`,
                    amount,
                    note: noteInput.value || '-'
                });
                amtInput.value = ''; noteInput.value = '';
                saveData();
            }
        }

        function deleteExpense(catId, expId) {
            if (confirm('Löschen?')) {
                const cat = data.find(c => c.id === catId);
                cat.expenses = cat.expenses.filter(e => e.id !== expId);
                saveData();
            }
        }

        function resetMonth() {
            if (confirm('Monat abschliessen?')) {
                data.forEach(cat => {
                    cat.bilanz += (cat.budget - cat.expenses.reduce((s, e) => s + e.amount, 0));
                    cat.expenses = [];
                });
                saveData();
            }
        }

        function showStats() {
            let total = 0;
            let html = `<h3 style="margin:0 0 10px 0;">📊 Bilanz</h3><table style="width:100%; font-size:0.9em;">`;
            data.forEach(cat => {
                const bal = cat.bilanz + (cat.budget - cat.expenses.reduce((s, e) => s + e.amount, 0));
                total += bal;
                html += `<tr><td>${cat.name}</td><td style="text-align:right; color:${bal < 0 ? 'red' : 'green'}">${bal.toFixed(2)}</td></tr>`;
            });
            html += `<tr style="border-top:1px solid #333; font-weight:bold;"><td>Gesamt</td><td style="text-align:right;">${total.toFixed(2)} CHF</td></tr></table>`;
            html += `<br><button class="secondary" onclick="document.getElementById('statsModal').style.display='none'">Schliessen</button>`;
            document.getElementById('statsContent').innerHTML = html;
            document.getElementById('statsModal').style.display = 'block';
        }

        function exportData() {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([JSON.stringify(data)], { type: 'application/json' }));
            a.download = `budget.json`; a.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { data = JSON.parse(ev.target.result); saveData(); };
            reader.readAsText(e.target.files[0]);
        }

        function render() {
            let html = '';
            data.forEach((cat) => {
                const spent = cat.expenses.reduce((s, e) => s + e.amount, 0);
                const rest = cat.budget - spent;
                const total = cat.bilanz + rest;

                html += `
                <div class="card">
                    <div class="cat-header">
                        <div class="cat-title">${cat.name}</div>
                        <div class="cat-stats">
                            <span style="font-weight:bold; color:${rest < 0 ? 'red' : 'green'};">${rest.toFixed(2)}</span>
                            <span style="color:#888; font-size:0.8em;">(Σ ${total.toFixed(0)})</span>
                            <div>
                                <button class="cat-btn" onclick="moveCategory(${cat.id}, -1)">↑</button>
                                <button class="cat-btn" onclick="moveCategory(${cat.id}, 1)">↓</button>
                                <button class="cat-btn" style="color:red" onclick="deleteCategory(${cat.id})">✕</button>
                            </div>
                        </div>
                    </div>
                    <div class="flex" style="margin-top:4px;">
                        <input type="number" step="any" id="amt_${cat.id}" placeholder="CHF" style="flex:0.8;">
                        <input type="text" id="note_${cat.id}" placeholder="Notiz" style="flex:1.2;">
                        <button class="primary action-btn" style="width:35px;" onclick="addExpense(${cat.id})">OK</button>
                    </div>
                    <details>
                        <summary>Historie (${cat.expenses.length})</summary>
                        <div class="table-scroll">
                            <table>
                                <colgroup><col style="width:40px;"><col style="width:50px;"><col><col style="width:30px;"></colgroup>
                                ${[...cat.expenses].reverse().map(e => `
                                    <tr>
                                        <td>${e.date}</td>
                                        <td><b>${e.amount}</b></td>
                                        <td style="color:#666;">${e.note}</td>
                                        <td style="text-align:right"><button class="danger action-btn" onclick="deleteExpense(${cat.id}, ${e.id})">✕</button></td>
                                    </tr>`).join('')}
                            </table>
                        </div>
                    </details>
                </div>`;
            });
            document.getElementById('app').innerHTML = html;
        }
        render();
    </script>
</body>
</html>
